services:
  postgres:
    image: postgres:16
    container_name: nba-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nba_pipeline}
      POSTGRES_USER: ${POSTGRES_USER:-nba_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nba_user} -d ${POSTGRES_DB:-nba_pipeline}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nba-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nba_user}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-nba_pipeline}
      NBA_SEASON: ${NBA_SEASON:-2025-26}
      NBA_API_TIMEOUT: ${NBA_API_TIMEOUT:-90}
      NBA_API_RETRIES: ${NBA_API_RETRIES:-3}
      PORT: 8000
    ports:
      - "80:8000"

volumes:
  postgres_data:
