services:
  - type: web
    name: nba-data-pipeline-api
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nba-data-pipeline-db
          property: connectionString

databases:
  - name: nba-data-pipeline-db
    plan: free
    region: oregon
    databaseName: nba_pipeline
