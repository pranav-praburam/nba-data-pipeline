name: Daily NBA Ingestion

on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    env:
      DEPLOYED_API_URL: "http://16.54.146.35"
      NBA_SEASON: "2025-26"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Trigger AWS Lightsail ingestion
        run: |
          curl --fail-with-body --show-error --silent --max-time 240 \
            --request POST \
            "$DEPLOYED_API_URL/admin/ingest?season=$NBA_SEASON"
