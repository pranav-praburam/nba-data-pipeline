name: Daily NBA Ingestion

on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.RENDER_DATABASE_URL }}
      NBA_SEASON: "2025-26"
      PYTHONPYCACHEPREFIX: /tmp/pycache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify production database secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Missing GitHub secret: RENDER_DATABASE_URL"
            echo "Add the Render external database URL as a repository secret before running scheduled ingestion."
            exit 1
          fi

      - name: Run incremental ingestion
        run: python scripts/run_daily_ingestion.py
